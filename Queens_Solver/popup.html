<!--
  Popup UI for the Queens Auto-Solver.
  The <head>/<body> wrapper is real here (unlike Artifacts) — this is a normal
  extension popup document. Logic lives in popup.js (no inline scripts, per MV3 CSP).
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <title>Queens Solver</title>
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">👑 Queens Solver</h1>
      <p id="status" class="status">Checking for a board…</p>
      <button id="solve" class="solve-btn" disabled>Solve puzzle</button>
      <p class="hint">Open the Queens game and start a round first.</p>
    </main>
    <script src="injected.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
