<!--
  Popup UI for the Patches Auto-Solver.
  The <head>/<body> wrapper is real here (unlike Artifacts) — this is a normal
  extension popup document. Logic lives in popup.js (no inline scripts, per MV3 CSP).
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <title>Patches Solver</title>
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">Patches Solver</h1>
      <p id="status" class="status">Checking for a board…</p>
      <button id="solve" class="solve-btn" disabled>Solve puzzle</button>
      <p class="hint">Start a round of the Patches game, then solve it.</p>
      <a
        class="coffee-link"
        href="https://buymeacoffee.com/benmagowan"
        target="_blank"
        rel="noopener noreferrer"
      >
        <img src="images/coffee.png" alt="" class="coffee-icon" />
        Buy me a coffee
      </a>
    </main>
    <script src="injected.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
